apiVersion: apps/v1
kind: Deployment
metadata:
  name: allianceauth-nginx
  labels:
    app: allianceauth-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allianceauth-nginx
  template:
    metadata:
      labels:
        app: allianceauth-nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: static
              mountPath: /var/www/myauth/static
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-config
          configMap:
            name: allianceauth-nginx
            defaultMode: 0444
        - name: static
          persistentVolumeClaim:
            claimName: allianceauth-static
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
