apiVersion: apps/v1
kind: Deployment
metadata:
  name: allianceauth-gunicorn
  labels:
    app: allianceauth-gunicorn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allianceauth-gunicorn
  template:
    metadata:
      labels:
        app: allianceauth-gunicorn
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 61000
        runAsGroup: 61000
        fsGroup: 61000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-allianceauth
          image: registry.gitlab.com/allianceauth/allianceauth/auth:v4.13.0 # {"$imagepolicy": "flux-system:allianceauth"}
          workingDir: /home/allianceauth/
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
          args:
            - >- 
              echo "Waiting for /home/allianceauth/myauth/myauth to be created..." &&
              while [ ! -e /home/allianceauth/myauth/myauth ]; do
                echo "Still waiting for /home/allianceauth/myauth/myauth..." &&
                sleep 5;
              done &&
              echo "Found /home/allianceauth/myauth/myauth, proceeding with initialization..." &&
              mkdir -p /var/www/myauth/static && pip install --upgrade -r /home/allianceauth/myauth/requirements.txt && python /home/allianceauth/myauth/manage.py check && allianceauth update myauth && python /home/allianceauth/myauth/manage.py migrate && python /home/allianceauth/myauth/manage.py collectstatic --noinput
          envFrom:
            - secretRef:
                name: allianceauth-env
                optional: true
          volumeMounts:
            - name: config
              mountPath:  /home/allianceauth/myauth
            - name: static
              mountPath: /var/www/myauth/static
      containers:
        - name: allianceauth
          image: registry.gitlab.com/allianceauth/allianceauth/auth:v4.13.0 # {"$imagepolicy": "flux-system:allianceauth"}
          workingDir: /home/allianceauth/myauth
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
          args:
            - pip install --upgrade -r /home/allianceauth/myauth/requirements.txt && exec gunicorn myauth.wsgi --bind=0.0.0.0:8000 --workers=3 --timeout=120 --max-requests=500 --max-requests-jitter=50
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: allianceauth-env
                optional: true
          volumeMounts:
            - name: config
              mountPath:  /home/allianceauth/myauth
            - name: static
              mountPath: /var/www/myauth/static
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: allianceauth-config
        - name: static
          persistentVolumeClaim:
            claimName: allianceauth-static
