---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: universe-update-orders
  namespace: mrakaki
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - args:
            - updateOrders
            env:
            - name: SPRING_PROFILES_ACTIVE
              value: production
            - name: SPRING_CONFIG_IMPORT
              value: configserver:http://configuration:8888
            image: mrakaki/dev-containers:mrakaki-eve-universe.0.0.5
            name: universe
            resources:
              limits:
                cpu: 1000m
                memory: 1Gi
              requests:
                cpu: 750m
                memory: 768Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
  schedule: 15 */4 * * *
  successfulJobsHistoryLimit: 0
