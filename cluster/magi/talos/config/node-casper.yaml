machine:
  network:
    interfaces:
      - interface: bond0
        dhcp: false
        bond:
          mode: 802.3ad
          lacpRate: fast
          miimon: 100
          interfaces:
            - eth0
            - eth1
        addresses:
          - fd7a:6e5b:cafe:10::7/64
          - 10.1.0.7/22
        routes:
          - network: ::/0
            gateway: fd7a:6e5b:cafe:10::1
          - network: 0.0.0.0/0
            gateway: 10.1.0.1
      - interface: eth2
        dhcp: false
        addresses:
          - fd7a:6e5b:beff::7/64
          - 10.255.100.7/24
      - interface: eth3
        dhcp: false
        addresses:
          - fd7a:6e5b:befe::7/64
          - 10.255.200.7/24
  install:
    disk: /dev/nvme2n1
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: casper
auto: off
