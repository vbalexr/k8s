apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
resources:
  - namespace.yaml
  - ../../../apps/redis

  - ../../../apps/mariadb
  - mariadb-credentials.yaml

  - ../../../apps/postgres
  - postgres-credentials.yaml

patches:
  - path: patches/redis.yaml
  - path: patches/mariadb.yaml
  - path: patches/postgres.yaml