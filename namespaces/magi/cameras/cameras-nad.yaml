apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: cameras
  namespace: cameras
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "bond0.25",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "172.16.25.0/24",
        "range_start": "172.16.25.200",
        "range_end": "172.16.25.250",
        "gateway": "172.16.25.1"
      }
    }
